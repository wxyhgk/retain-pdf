<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OCR MinerU Frontend</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <h1>MinerU 翻译面板</h1>
          <p class="muted">三步完成：提交 PDF，观察状态，下载结果。</p>
        </div>
        <div class="hero-actions">
          <label class="api-field">
            <span>API Base</span>
            <input id="api-base" name="apiBase" type="text" value="" />
          </label>
          <button id="developer-btn" type="button" class="secondary">开发人员</button>
        </div>
      </header>

      <section class="panel-grid">
        <section class="card panel">
          <h2>提交</h2>
          <p class="muted">选择一个 PDF，然后直接启动任务。</p>
          <form id="job-form" class="form">
            <label for="file" class="upload-tile">
              <input id="file" name="file" type="file" accept="application/pdf,.pdf" required />
              <span class="upload-kicker">PDF 上传</span>
              <strong id="file-label">点击选择文件或拖到这里</strong>
              <em>支持单个 PDF，默认参数可直接运行</em>
            </label>

            <div class="actions vertical-actions">
              <button id="submit-btn" type="submit">运行任务</button>
            </div>
          </form>
        </section>

        <section class="card panel">
          <div class="status-head simple-head">
            <h2>状态</h2>
            <button id="stop-btn" type="button" class="secondary">停止轮询</button>
          </div>

          <div class="status-stack">
            <div>
              <div class="label">job_id</div>
              <div id="job-id" class="mono">-</div>
            </div>
            <div>
              <div class="label">status</div>
              <div id="job-status" class="badge idle">idle</div>
            </div>
            <div>
              <div class="label">job_type</div>
              <div id="job-type" class="mono">-</div>
            </div>
          </div>

          <div class="top-gap">
            <div class="label">错误信息</div>
            <pre id="error-box" class="log error-box">-</pre>
          </div>

          <details class="raw-panel top-gap">
            <summary>详细信息</summary>
            <div class="top-gap">
              <div class="label">关键产物</div>
              <dl id="artifacts" class="artifacts">
                <div><dt>job_root</dt><dd>-</dd></div>
                <div><dt>source_pdf</dt><dd>-</dd></div>
                <div><dt>layout_json</dt><dd>-</dd></div>
                <div><dt>translations_dir</dt><dd>-</dd></div>
                <div><dt>output_pdf</dt><dd>-</dd></div>
                <div><dt>summary</dt><dd>-</dd></div>
              </dl>
            </div>
            <div class="top-gap">
              <div class="label">原始响应 JSON</div>
              <pre id="raw-json" class="log">-</pre>
            </div>
          </details>
        </section>

        <section class="card panel">
          <h2>查询 / 下载</h2>
          <p class="muted">输入已有任务号可继续查看，成功后直接下载 ZIP。</p>

          <div class="form">
            <label>
              <span>job_id</span>
              <input id="job-id-input" type="text" placeholder="粘贴已有 job_id" />
            </label>

            <div class="actions vertical-actions">
              <button id="watch-btn" class="secondary" type="button">查询任务</button>
              <a id="download-btn" class="button-link disabled" href="#" target="_blank" rel="noopener noreferrer">下载结果 ZIP</a>
            </div>
          </div>
        </section>
      </section>
    </main>

    <dialog id="developer-dialog" class="dev-dialog">
      <form method="dialog" class="dev-shell">
        <div class="dev-head">
          <h2>开发人员参数</h2>
          <button id="developer-close-btn" type="submit" class="secondary">关闭</button>
        </div>

        <div class="advanced-body">
          <div class="grid three">
            <label>
              <span>mode</span>
              <select id="mode" name="mode">
                <option value="sci" selected>sci</option>
                <option value="fast">fast</option>
                <option value="precise">precise</option>
              </select>
            </label>
            <label>
              <span>model</span>
              <input id="model" name="model" type="text" value="Q3.5-turbo" />
            </label>
            <label>
              <span>base_url</span>
              <input id="base_url" name="base_url" type="text" value="http://1.94.67.196:10001/v1" />
            </label>
          </div>

          <div class="grid three">
            <label>
              <span>api_key</span>
              <input id="api_key" name="api_key" type="password" value="" />
            </label>
            <label>
              <span>workers</span>
              <input id="workers" name="workers" type="number" min="1" value="4" />
            </label>
            <label>
              <span>batch_size</span>
              <input id="batch_size" name="batch_size" type="number" min="1" value="6" />
            </label>
          </div>

          <div class="grid three">
            <label>
              <span>render_mode</span>
              <select id="render_mode" name="render_mode">
                <option value="typst" selected>typst</option>
                <option value="auto">auto</option>
                <option value="compact">compact</option>
                <option value="direct">direct</option>
                <option value="dual">dual</option>
              </select>
            </label>
            <label>
              <span>mineru_token</span>
              <input id="mineru_token" name="mineru_token" type="password" value="" />
            </label>
            <label>
              <span>model_version</span>
              <select id="model_version" name="model_version">
                <option value="vlm" selected>vlm</option>
                <option value="pipeline">pipeline</option>
                <option value="MinerU-HTML">MinerU-HTML</option>
              </select>
            </label>
          </div>

          <div class="grid three">
            <label>
              <span>language</span>
              <input id="language" name="language" type="text" value="ch" />
            </label>
            <label>
              <span>page_ranges</span>
              <input id="page_ranges" name="page_ranges" type="text" placeholder="例如 1-3" />
            </label>
            <label class="checkbox-row compact-check">
              <input id="skip_title_translation" name="skip_title_translation" type="checkbox" />
              <span>skip_title_translation</span>
            </label>
          </div>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
