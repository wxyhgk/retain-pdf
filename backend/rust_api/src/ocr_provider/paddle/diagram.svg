      <stop offset="0%" stop-color="#266dd3"/>
      <stop offset="100%" stop-color="#36c0a4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="230" rx="18" fill="#fdfdfd" stroke="#cccccc" stroke-width="2"/>
  <text x="30" y="40" font-family="JetBrains Mono" font-size="20" fill="#1a1a1a">PaddleOCR JSON Split</text>
  <line x1="40" y1="70" x2="560" y2="70" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="140" cy="110" r="30" fill="#266dd3" opacity="0.9"/>
  <circle cx="300" cy="110" r="30" fill="#36c0a4" opacity="0.9"/>
  <circle cx="460" cy="110" r="30" fill="#f4b740" opacity="0.95"/>
