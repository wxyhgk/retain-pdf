  <path d="M 170 110 Q 220 90 270 110" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <path d="M 330 110 Q 380 130 430 110" stroke="#1a1a1a" stroke-width="2" fill="none"/>
