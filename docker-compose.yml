name: retainpdf

services:
  app:
    image: ${APP_IMAGE:-wxyhgk/retainpdf-app:latest}
    restart: unless-stopped
    env_file:
      - ./docker/app.env
    volumes:
      - app_output:/data/output
      - app_runtime:/data/rust-api
      - ./docker/auth.local.json:/app/rust_api/auth.local.json:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:41000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  web:
    image: ${WEB_IMAGE:-wxyhgk/retainpdf-web:latest}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - ./docker/web.env
    ports:
      - "${WEB_PORT:-40001}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  app_output:
  app_runtime:
