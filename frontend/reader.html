<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF 对照阅读</title>
    <link rel="icon" type="image/svg+xml" href="./src/assets/RetainPDF-logo.svg" />
    <link rel="shortcut icon" href="./src/assets/RetainPDF-logo.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./node_modules/pdfjs-dist/web/pdf_viewer.css" />
    <style>
      body.reader-body {
        margin: 0;
        background: #f3f4f6;
        color: var(--ink);
        overflow: hidden;
      }

      .reader-scroll-shell {
        position: absolute;
        inset: 0;
        overflow: auto;
        background: #f3f4f6;
      }

      .reader-page {
        min-height: 100vh;
        position: relative;
      }

      .reader-boot-loading {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: grid;
        place-items: center;
        background: #f3f4f6;
      }

      .reader-boot-loading.hidden {
        display: none;
      }

      .reader-boot-loading-card {
        display: grid;
        gap: 12px;
        width: min(320px, calc(100vw - 40px));
      }

      .reader-boot-loading-text {
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        color: #3a3a3c;
        letter-spacing: -0.01em;
      }

      .reader-boot-loading-track {
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(29, 29, 31, 0.08);
      }

      .reader-boot-loading-bar {
        display: block;
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #3a3a3c 0%, #1d1d1f 100%);
        transition: width 0.24s ease;
      }

      .reader-page-indicator {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        z-index: 30;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 88px;
        min-height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: #1d1d1f;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: -0.01em;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .reader-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 0;
        min-height: 100vh;
        align-items: start;
      }

      .reader-panel {
        min-width: 0;
        min-height: 100vh;
        position: relative;
      }

      .reader-panel + .reader-panel {
        border-left: 1px solid rgba(15, 23, 42, 0.04);
      }

      .reader-viewer-wrap {
        position: relative;
        min-height: 100vh;
      }

      .reader-viewer-host {
        position: relative;
        min-height: 100vh;
        padding: 12px 8px 20vh;
      }

      .reader-viewer-host .pdfViewer {
        width: 100%;
      }

      .reader-viewer-host .pdfViewer .page {
        margin: 0 auto 12px;
        border: none;
        box-shadow: none;
        background: #fff;
      }

      .reader-viewer-host .pdfViewer .canvasWrapper {
        overflow: hidden;
        border: none;
        box-shadow: none;
      }

      .reader-viewer-host .pdfViewer.removePageBorders .page {
        margin-bottom: 12px;
      }

      .reader-viewer-host .textLayer {
        inset: 0;
      }

      .reader-empty {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6e6e73;
        font-size: 13px;
      }

      @media (max-width: 720px) {
        .reader-page-indicator {
          bottom: 12px;
          min-height: 32px;
          min-width: 80px;
          padding-inline: 12px;
          font-size: 11px;
        }

        .reader-grid {
          grid-template-columns: 1fr;
        }

        .reader-panel {
          min-height: auto;
        }

        .reader-panel + .reader-panel {
          border-left: none;
          border-top: 8px solid #f3f4f6;
        }

        .reader-viewer-wrap,
        .reader-viewer-host,
        .reader-empty {
          min-height: 56vh;
        }
      }
    </style>
    <script src="./runtime-config.js"></script>
    <script src="./runtime-config.local.js"></script>
  </head>
  <body class="reader-body">
    <div id="reader-boot-loading" class="reader-boot-loading" aria-live="polite">
      <div class="reader-boot-loading-card">
        <div id="reader-boot-loading-text" class="reader-boot-loading-text">正在准备对照阅读…</div>
        <div class="reader-boot-loading-track">
          <span id="reader-boot-loading-bar" class="reader-boot-loading-bar"></span>
        </div>
      </div>
    </div>
    <div id="reader-scroll-shell" class="reader-scroll-shell">
      <div class="reader-page">
        <div id="reader-page-indicator" class="reader-page-indicator hidden">第 1 / 1 页</div>
        <main class="reader-grid">
          <section class="reader-panel">
            <div id="reader-pdf-empty" class="reader-empty hidden"></div>
            <div id="reader-pdf-wrap" class="reader-viewer-wrap hidden">
              <div id="reader-pdf-viewer-host" class="reader-viewer-host">
                <div id="reader-pdf-viewer" class="pdfViewer"></div>
              </div>
            </div>
          </section>

          <section class="reader-panel">
            <div id="reader-translation-empty" class="reader-empty hidden"></div>
            <div id="reader-translated-pdf-wrap" class="reader-viewer-wrap hidden">
              <div id="reader-translated-pdf-viewer-host" class="reader-viewer-host">
                <div id="reader-translated-pdf-viewer" class="pdfViewer"></div>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./src/js/reader.js"></script>
  </body>
</html>
