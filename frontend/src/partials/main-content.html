<main id="app-shell" class="page app-shell">
  <app-shell-header></app-shell-header>

  <section class="card workflow-card">
    <div id="job-warning" class="job-warning hidden">检测到上一个任务仍在处理中。建议先等待当前任务结束，再提交新的 PDF。</div>

    <form id="job-form" class="form" novalidate>
      <input id="mineru_token" name="mineru_token" type="hidden" value="" />
      <input id="api_key" name="api_key" type="hidden" value="" />

      <div class="upload-tile upload-tile-hero">
        <input id="file" name="file" type="file" accept="application/pdf,.pdf" />
        <span id="upload-fill" class="upload-fill" aria-hidden="true"></span>
        <div id="credential-gate" class="credential-gate hidden">
          <div class="credential-gate-panel" aria-live="polite">
            <span class="credential-gate-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M8 11V8a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <rect x="5" y="11" width="14" height="10" rx="3" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="12" cy="16" r="1.2" fill="currentColor"/>
              </svg>
            </span>
            <strong id="credential-gate-title">请先完成接口设置</strong>
            <em id="credential-gate-help">右下角可随时修改 MinerU Token 和 DeepSeek Key，填写后即可上传 PDF。</em>
          </div>
        </div>
        <span id="upload-glyph" class="upload-glyph" aria-hidden="true">
          <span class="upload-glyph-h"></span>
          <span class="upload-glyph-v"></span>
        </span>
        <strong id="file-label">拖拽或点击上传 PDF</strong>
        <em id="upload-help">上传后会先完成文件校验，再进入任务处理。</em>
        <div class="upload-meta upload-meta-inline">
          <span>单个 PDF</span>
          <span>最大 100MB</span>
          <span>最多 100 页</span>
        </div>
        <div id="upload-status" class="upload-status hidden">尚未选择文件</div>
        <div id="upload-progress-panel" class="upload-progress-panel hidden" aria-live="polite">
          <span id="upload-progress-text">上传中</span>
        </div>
        <div id="upload-action-slot" class="upload-action-slot hidden">
          <div class="upload-action-group">
            <button id="page-range-btn" type="button" class="page-range-mini secondary" aria-label="分页翻译" title="分页翻译">分页翻译</button>
            <button id="submit-btn" type="submit" disabled>全书翻译</button>
          </div>
        </div>
      <page-range-summary id="page-range-summary" class="hidden">已选择页码：-</page-range-summary>
      </div>
      <inline-error-box id="error-box-inline" class="hidden">-</inline-error-box>
    </form>
  </section>

  <job-status-card id="status-section"></job-status-card>

  <div class="query-entry">
    <button id="open-query-btn" type="button" class="secondary">最近任务</button>
    <button id="credentials-btn" type="button" class="icon-button secondary" aria-label="接口设置" title="接口设置">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.2 7.2 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.49-.42h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.58.22-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.4 1.05.72 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.84a.5.5 0 0 0 .49-.42l.36-2.54c.58-.22 1.13-.54 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58Z" stroke="currentColor" stroke-width="1.45" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="2.9" stroke="currentColor" stroke-width="1.45"/>
      </svg>
    </button>
  </div>

  <recent-jobs-dialog></recent-jobs-dialog>
</main>
