name: Release Desktop

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  TYPST_VERSION: "0.14.2"

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          $version = ""
          if (-not [string]::IsNullOrWhiteSpace($refName) -and $refName.StartsWith("v")) {
            $version = $refName.TrimStart("v")
          } elseif (Test-Path "VERSION") {
            $version = (Get-Content VERSION -Raw).Trim()
          } else {
            $package = Get-Content "desktop/package.json" -Raw | ConvertFrom-Json
            $version = "$($package.version)".Trim()
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "release version is empty"
          }
          $tag = "v$version"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Write VERSION file
        shell: pwsh
        run: |
          Set-Content -Path VERSION -Value "${{ steps.version.outputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Python runtime for desktop bundle
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x86"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Build Rust API for Windows
        shell: pwsh
        run: cargo build --release --target i686-pc-windows-msvc --manifest-path backend/rust_api/Cargo.toml

      - name: Assemble bundled Typst runtime
        shell: pwsh
        run: |
          $typstVersion = "${{ env.TYPST_VERSION }}"
          $typstUrl = "https://github.com/typst/typst/releases/download/v$typstVersion/typst-x86_64-pc-windows-msvc.zip"
          $downloadZip = Join-Path $env:RUNNER_TEMP "typst-windows.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "typst-windows"
          $bundleRoot = Join-Path $PWD "backend/typst-win32"
          Write-Host "Downloading Typst $typstVersion from $typstUrl"
          Invoke-WebRequest -Uri $typstUrl -OutFile $downloadZip
          if (Test-Path $extractRoot) {
            Remove-Item $extractRoot -Recurse -Force
          }
          Expand-Archive -Path $downloadZip -DestinationPath $extractRoot -Force
          if (Test-Path $bundleRoot) {
            Remove-Item $bundleRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path (Join-Path $bundleRoot "bin") -Force | Out-Null
          $typstExe = Get-ChildItem -Path $extractRoot -Recurse -Filter "typst.exe" | Select-Object -First 1
          if (-not $typstExe) {
            throw "typst.exe not found in downloaded archive"
          }
          Copy-Item $typstExe.FullName (Join-Path $bundleRoot "bin/typst.exe") -Force
          Get-Item (Join-Path $bundleRoot "bin/typst.exe") | Select-Object FullName, Length, LastWriteTime

      - name: Assemble bundled Python runtime
        shell: pwsh
        run: |
          $pythonExe = (Get-Command python).Source
          $pythonRoot = Split-Path -Parent $pythonExe
          $bundleRoot = Join-Path $PWD "backend/python"
          Write-Host "Using Python executable: $pythonExe"
          Write-Host "Python runtime root: $pythonRoot"
          if (Test-Path $bundleRoot) {
            Remove-Item $bundleRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $bundleRoot | Out-Null
          robocopy $pythonRoot $bundleRoot /E /NFL /NDL /NJH /NJS /NP /XD "__pycache__" "Doc" "docs" "Tools"
          if ($LASTEXITCODE -gt 7) {
            exit $LASTEXITCODE
          }
          $sitePackages = Join-Path $bundleRoot "Lib/site-packages"
          if (Test-Path $sitePackages) {
            Remove-Item $sitePackages -Recurse -Force
          }
          New-Item -ItemType Directory -Path $sitePackages -Force | Out-Null
          python -m pip install --upgrade pip
          python -m pip install --target $sitePackages -r desktop/requirements-desktop-windows.txt
          Get-ChildItem $bundleRoot | Select-Object Name, Length, LastWriteTime
          $bundleSize = [Math]::Round(((Get-ChildItem $bundleRoot -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB), 2)
          Write-Host "Bundled Python size: ${bundleSize} MB"

      - name: Install desktop dependencies
        working-directory: desktop
        shell: pwsh
        run: npm ci

      - name: Build Windows installer package
        working-directory: desktop
        shell: pwsh
        env:
          RETAIN_PDF_VERSION: ${{ steps.version.outputs.version }}
        run: npm run dist:win32-installer

      - name: Show desktop bundle manifest
        shell: pwsh
        run: |
          Get-Content desktop/app/backend/bundle-manifest.json

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            desktop/win/RetainPDF-${{ steps.version.outputs.version }}-Setup.exe

  build-macos-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: bash
        run: |
          ref_name="${{ github.ref_name }}"
          version=""
          if [ -n "$ref_name" ] && [[ "$ref_name" == v* ]]; then
            version="${ref_name#v}"
          elif [ -f VERSION ]; then
            version="$(tr -d '\r\n' < VERSION)"
          else
            version="$(node -p "require('./desktop/package.json').version")"
          fi
          if [ -z "$version" ]; then
            echo "release version is empty" >&2
            exit 1
          fi
          tag="v$version"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Write VERSION file
        shell: bash
        run: |
          printf '%s\n' "${{ steps.version.outputs.version }}" > VERSION

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Python runtime for desktop bundle
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust API for macOS
        shell: bash
        run: cargo build --release --manifest-path backend/rust_api/Cargo.toml

      - name: Install qpdf build dependency
        shell: bash
        run: |
          brew update
          brew install qpdf
          brew --prefix qpdf

      - name: Assemble bundled Python runtime
        shell: bash
        run: |
          qpdf_prefix="$(brew --prefix qpdf)"
          python_bin="$(python3 -c 'import sys; print(sys.executable)')"
          python_root="$(PYTHON_BIN="$python_bin" python3 - <<'PY'
          import os
          from pathlib import Path

          python_bin = Path(os.environ["PYTHON_BIN"]).resolve()
          print(python_bin.parent.parent)
          PY
          )"
          bundle_root="$PWD/backend/python"
          echo "Using Python executable: $python_bin"
          echo "Python runtime root: $python_root"
          rm -rf "$bundle_root"
          mkdir -p "$bundle_root"
          rsync -aL --delete \
            --exclude '__pycache__' \
            "$python_root"/ "$bundle_root"/
          export CPPFLAGS="-I$qpdf_prefix/include ${CPPFLAGS:-}"
          export LDFLAGS="-L$qpdf_prefix/lib ${LDFLAGS:-}"
          export PKG_CONFIG_PATH="$qpdf_prefix/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          "$bundle_root/bin/python3" -m pip install --upgrade pip
          "$bundle_root/bin/python3" -m pip install -r desktop/requirements-desktop-macos.txt
          du -sh "$bundle_root"

      - name: Install desktop dependencies
        working-directory: desktop
        shell: bash
        run: npm ci

      - name: Build macOS package
        working-directory: desktop
        shell: bash
        env:
          RETAIN_PDF_VERSION: ${{ steps.version.outputs.version }}
          RETAIN_PDF_DESKTOP_PLATFORM: darwin
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:mac

      - name: Upload macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            desktop/mac/RetainPDF-${{ steps.version.outputs.version }}-mac-*.zip
            desktop/mac/RetainPDF-${{ steps.version.outputs.version }}-mac-*.dmg
