name: Release Desktop

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  TYPST_VERSION: "0.14.2"
  CMARKER_VERSION: "0.1.8"
  MITEX_VERSION: "0.2.6"

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($refName) -or -not $refName.StartsWith("v")) {
            throw "release workflow must be triggered by a version tag"
          }
          $version = $refName.TrimStart("v")
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "release version is empty"
          }
          $tag = "v$version"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            desktop/package-lock.json
            frontend/package-lock.json

      - name: Setup Python runtime for desktop bundle
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x86"

      - name: Verify generated Python requirement snapshots
        shell: pwsh
        run: python backend/scripts/devtools/sync_python_requirements.py --repo-root . --check

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Build Rust API for Windows
        shell: pwsh
        run: cargo build --release --target i686-pc-windows-msvc --manifest-path backend/rust_api/Cargo.toml

      - name: Assemble bundled Typst runtime
        shell: pwsh
        run: |
          $typstVersion = "${{ env.TYPST_VERSION }}"
          $typstUrl = "https://github.com/typst/typst/releases/download/v$typstVersion/typst-x86_64-pc-windows-msvc.zip"
          $downloadZip = Join-Path $env:RUNNER_TEMP "typst-windows.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "typst-windows"
          $bundleRoot = Join-Path $PWD "desktop/src/runtime/windows/typst"
          Write-Host "Downloading Typst $typstVersion from $typstUrl"
          Invoke-WebRequest -Uri $typstUrl -OutFile $downloadZip
          if (Test-Path $extractRoot) {
            Remove-Item $extractRoot -Recurse -Force
          }
          Expand-Archive -Path $downloadZip -DestinationPath $extractRoot -Force
          if (Test-Path $bundleRoot) {
            Remove-Item $bundleRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path (Join-Path $bundleRoot "bin") -Force | Out-Null
          $typstExe = Get-ChildItem -Path $extractRoot -Recurse -Filter "typst.exe" | Select-Object -First 1
          if (-not $typstExe) {
            throw "typst.exe not found in downloaded archive"
          }
          Copy-Item $typstExe.FullName (Join-Path $bundleRoot "bin/typst.exe") -Force
          Get-Item (Join-Path $bundleRoot "bin/typst.exe") | Select-Object FullName, Length, LastWriteTime

      - name: Assemble bundled Typst packages
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $PWD "desktop/src/runtime/shared/typst-packages/preview"
          $packages = @(
            @{ Name = "cmarker"; Version = "${{ env.CMARKER_VERSION }}" },
            @{ Name = "mitex"; Version = "${{ env.MITEX_VERSION }}" }
          )
          if (Test-Path (Join-Path $PWD "desktop/src/runtime/shared/typst-packages")) {
            Remove-Item (Join-Path $PWD "desktop/src/runtime/shared/typst-packages") -Recurse -Force
          }
          foreach ($pkg in $packages) {
            $url = "https://packages.typst.org/preview/$($pkg.Name)-$($pkg.Version).tar.gz"
            $download = Join-Path $env:RUNNER_TEMP "$($pkg.Name)-$($pkg.Version).tar.gz"
            $extractRoot = Join-Path $env:RUNNER_TEMP "$($pkg.Name)-$($pkg.Version)"
            $targetDir = Join-Path $bundleRoot "$($pkg.Name)/$($pkg.Version)"
            Invoke-WebRequest -Uri $url -OutFile $download
            if (Test-Path $extractRoot) {
              Remove-Item $extractRoot -Recurse -Force
            }
            New-Item -ItemType Directory -Path $extractRoot -Force | Out-Null
            tar -xzf $download -C $extractRoot
            New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
            Copy-Item (Join-Path $extractRoot "*") $targetDir -Recurse -Force
          }
          Get-ChildItem (Join-Path $PWD "desktop/src/runtime/shared/typst-packages") -Recurse | Select-Object FullName, Length

      - name: Assemble bundled Python runtime
        shell: pwsh
        run: |
          $pythonExe = (Get-Command python).Source
          $pythonRoot = Split-Path -Parent $pythonExe
          $bundleRoot = Join-Path $PWD "desktop/src/runtime/windows/python"
          Write-Host "Using Python executable: $pythonExe"
          Write-Host "Python runtime root: $pythonRoot"
          if (Test-Path $bundleRoot) {
            Remove-Item $bundleRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $bundleRoot | Out-Null
          robocopy $pythonRoot $bundleRoot /E /NFL /NDL /NJH /NJS /NP /XD "__pycache__" "Doc" "docs" "Tools"
          if ($LASTEXITCODE -gt 7) {
            exit $LASTEXITCODE
          }
          $sitePackages = Join-Path $bundleRoot "Lib/site-packages"
          if (Test-Path $sitePackages) {
            Remove-Item $sitePackages -Recurse -Force
          }
          New-Item -ItemType Directory -Path $sitePackages -Force | Out-Null
          python -m pip install --upgrade pip
          python -m pip install --target $sitePackages -r desktop/requirements-desktop-windows.txt
          $pythonBundleExe = Join-Path $bundleRoot "python.exe"
          $env:PYTHONPATH = $sitePackages
          & $pythonBundleExe -c "import requests, fitz, pikepdf, PIL, urllib3; print('python_bundle_import_check=ok')"
          Remove-Item Env:PYTHONPATH -ErrorAction SilentlyContinue
          Get-ChildItem $bundleRoot | Select-Object Name, Length, LastWriteTime
          $bundleSize = [Math]::Round(((Get-ChildItem $bundleRoot -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB), 2)
          Write-Host "Bundled Python size: ${bundleSize} MB"

      - name: Install desktop dependencies
        working-directory: desktop
        shell: pwsh
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        shell: pwsh
        run: npm ci

      - name: Build Windows installer package
        working-directory: desktop
        shell: pwsh
        env:
          RETAIN_PDF_VERSION: ${{ steps.version.outputs.version }}
        run: npm run dist:win32-installer

      - name: Show desktop bundle manifest
        shell: pwsh
        run: |
          Get-Content desktop/app/backend/bundle-manifest.json

      - name: Validate desktop bundle manifest
        shell: pwsh
        run: python .github/scripts/validate_desktop_bundle.py --manifest desktop/app/backend/bundle-manifest.json

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            desktop/win/RetainPDF-Windows-${{ steps.version.outputs.version }}-Setup.exe

  build-linux-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: bash
        run: |
          ref_name="${{ github.ref_name }}"
          if [ -z "$ref_name" ] || [[ "$ref_name" != v* ]]; then
            echo "release workflow must be triggered by a version tag" >&2
            exit 1
          fi
          version="${ref_name#v}"
          if [ -z "$version" ]; then
            echo "release version is empty" >&2
            exit 1
          fi
          tag="v$version"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            desktop/package-lock.json
            frontend/package-lock.json

      - name: Setup Python runtime for desktop bundle
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify generated Python requirement snapshots
        shell: bash
        run: python backend/scripts/devtools/sync_python_requirements.py --repo-root . --check

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust API for Linux
        shell: bash
        run: cargo build --release --manifest-path backend/rust_api/Cargo.toml

      - name: Install Linux packaging dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Assemble bundled Typst runtime
        shell: bash
        run: |
          typst_version="${{ env.TYPST_VERSION }}"
          typst_url="https://github.com/typst/typst/releases/download/v${typst_version}/typst-x86_64-unknown-linux-musl.tar.xz"
          download_tar="$RUNNER_TEMP/typst-linux.tar.xz"
          extract_root="$RUNNER_TEMP/typst-linux"
          bundle_root="$PWD/desktop/src/runtime/linux/typst"
          echo "Downloading Typst $typst_version from $typst_url"
          curl -L "$typst_url" -o "$download_tar"
          rm -rf "$extract_root" "$bundle_root"
          mkdir -p "$extract_root" "$bundle_root/bin"
          tar -xJf "$download_tar" -C "$extract_root"
          typst_bin="$(find "$extract_root" -type f -name typst | head -n 1)"
          if [ -z "$typst_bin" ]; then
            echo "typst binary not found in downloaded archive" >&2
            exit 1
          fi
          install -m 755 "$typst_bin" "$bundle_root/bin/typst"
          ls -lah "$bundle_root/bin/typst"

      - name: Assemble bundled Typst packages
        shell: bash
        run: |
          bundle_root="$PWD/desktop/src/runtime/shared/typst-packages/preview"
          rm -rf "$PWD/desktop/src/runtime/shared/typst-packages"
          mkdir -p "$bundle_root"
          for spec in "cmarker:${{ env.CMARKER_VERSION }}" "mitex:${{ env.MITEX_VERSION }}"; do
            name="${spec%%:*}"
            version="${spec##*:}"
            url="https://packages.typst.org/preview/${name}-${version}.tar.gz"
            download="$RUNNER_TEMP/${name}-${version}.tar.gz"
            extract_root="$RUNNER_TEMP/${name}-${version}"
            target_dir="$bundle_root/$name/$version"
            curl -L "$url" -o "$download"
            rm -rf "$extract_root"
            mkdir -p "$extract_root" "$target_dir"
            tar -xzf "$download" -C "$extract_root"
            cp -R "$extract_root"/. "$target_dir"/
          done
          find "$PWD/desktop/src/runtime/shared/typst-packages" -maxdepth 4 -type f | sort

      - name: Assemble bundled Python runtime
        shell: bash
        run: |
          python_bin="$(python3 -c 'import sys; print(sys.executable)')"
          python_root="$(PYTHON_BIN="$python_bin" python3 - <<'PY'
          import os
          from pathlib import Path

          python_bin = Path(os.environ["PYTHON_BIN"]).resolve()
          print(python_bin.parent.parent)
          PY
          )"
          bundle_root="$PWD/desktop/src/runtime/linux/python"
          echo "Using Python executable: $python_bin"
          echo "Python runtime root: $python_root"
          rm -rf "$bundle_root"
          mkdir -p "$bundle_root"
          rsync -aL --delete \
            --exclude '__pycache__' \
            "$python_root"/ "$bundle_root"/
          "$bundle_root/bin/python3" -m pip install --upgrade pip
          py_minor="$("$bundle_root/bin/python3" - <<'PY'
          import sys
          print(f"{sys.version_info.major}.{sys.version_info.minor}")
          PY
          )"
          site_packages="$bundle_root/lib/python${py_minor}/site-packages"
          mkdir -p "$site_packages"
          "$bundle_root/bin/python3" -m pip install --target "$site_packages" -r desktop/requirements-desktop-posix.txt
          "$bundle_root/bin/python3" - <<'PY'
          import requests, fitz, pikepdf, PIL, urllib3
          print("python_bundle_import_check=ok")
          PY
          ldd "$bundle_root/bin/python3"
          bad_refs="$( \
            { ldd "$bundle_root/bin/python3" 2>/dev/null; \
              find "$bundle_root" \( -name '*.so' -o -name '*.dylib' \) -type f -print0 | \
              xargs -0 -I{} sh -c 'ldd "{}" 2>/dev/null || true'; } | \
            rg '/Library/Frameworks/Python\\.framework|/opt/homebrew/Cellar|/usr/local/Cellar|/usr/local/opt/' || true \
          )"
          if [ -n "$bad_refs" ]; then
            echo "Bundled Linux Python runtime still contains host-specific library references:" >&2
            echo "$bad_refs" >&2
            exit 1
          fi
          du -sh "$bundle_root"

      - name: Install desktop dependencies
        working-directory: desktop
        shell: bash
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        shell: bash
        run: npm ci

      - name: Build Linux package
        working-directory: desktop
        shell: bash
        env:
          RETAIN_PDF_VERSION: ${{ steps.version.outputs.version }}
          RETAIN_PDF_DESKTOP_PLATFORM: linux
        run: npm run dist:linux

      - name: Show desktop bundle manifest
        shell: bash
        run: cat desktop/app/backend/bundle-manifest.json

      - name: Validate desktop bundle manifest
        shell: bash
        run: python3 .github/scripts/validate_desktop_bundle.py --manifest desktop/app/backend/bundle-manifest.json

      - name: Upload Linux release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            desktop/linux/RetainPDF-Linux-${{ steps.version.outputs.version }}.deb

  build-macos-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: bash
        run: |
          ref_name="${{ github.ref_name }}"
          if [ -z "$ref_name" ] || [[ "$ref_name" != v* ]]; then
            echo "release workflow must be triggered by a version tag" >&2
            exit 1
          fi
          version="${ref_name#v}"
          if [ -z "$version" ]; then
            echo "release version is empty" >&2
            exit 1
          fi
          tag="v$version"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            desktop/package-lock.json
            frontend/package-lock.json

      - name: Setup Python runtime for desktop bundle
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify generated Python requirement snapshots
        shell: bash
        run: python backend/scripts/devtools/sync_python_requirements.py --repo-root . --check

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust API for macOS
        shell: bash
        run: cargo build --release --manifest-path backend/rust_api/Cargo.toml

      - name: Assemble bundled Typst runtime
        shell: bash
        run: |
          typst_version="${{ env.TYPST_VERSION }}"
          typst_url="https://github.com/typst/typst/releases/download/v${typst_version}/typst-aarch64-apple-darwin.tar.xz"
          download_tar="$RUNNER_TEMP/typst-macos.tar.xz"
          extract_root="$RUNNER_TEMP/typst-macos"
          bundle_root="$PWD/desktop/src/runtime/mac/typst"
          echo "Downloading Typst $typst_version from $typst_url"
          curl -L "$typst_url" -o "$download_tar"
          rm -rf "$extract_root" "$bundle_root"
          mkdir -p "$extract_root" "$bundle_root/bin"
          tar -xJf "$download_tar" -C "$extract_root"
          typst_bin="$(find "$extract_root" -type f -name typst | head -n 1)"
          if [ -z "$typst_bin" ]; then
            echo "typst binary not found in downloaded archive" >&2
            exit 1
          fi
          install -m 755 "$typst_bin" "$bundle_root/bin/typst"
          ls -lah "$bundle_root/bin/typst"

      - name: Assemble bundled Typst packages
        shell: bash
        run: |
          bundle_root="$PWD/desktop/src/runtime/shared/typst-packages/preview"
          rm -rf "$PWD/desktop/src/runtime/shared/typst-packages"
          mkdir -p "$bundle_root"
          for spec in "cmarker:${{ env.CMARKER_VERSION }}" "mitex:${{ env.MITEX_VERSION }}"; do
            name="${spec%%:*}"
            version="${spec##*:}"
            url="https://packages.typst.org/preview/${name}-${version}.tar.gz"
            download="$RUNNER_TEMP/${name}-${version}.tar.gz"
            extract_root="$RUNNER_TEMP/${name}-${version}"
            target_dir="$bundle_root/$name/$version"
            curl -L "$url" -o "$download"
            rm -rf "$extract_root"
            mkdir -p "$extract_root" "$target_dir"
            tar -xzf "$download" -C "$extract_root"
            cp -R "$extract_root"/. "$target_dir"/
          done
          find "$PWD/desktop/src/runtime/shared/typst-packages" -maxdepth 4 -type f | sort

      - name: Install qpdf build dependency
        shell: bash
        run: |
          brew update
          brew install qpdf
          brew --prefix qpdf

      - name: Assemble bundled Python runtime
        shell: bash
        run: |
          qpdf_prefix="$(brew --prefix qpdf)"
          bundle_root="$PWD/desktop/src/runtime/mac/python"
          python_executable="$(python3 -c 'import sys; print(sys.executable)')"
          framework_python="$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("PYTHONFRAMEWORK"))')"
          framework_prefix="$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("PYTHONFRAMEWORKPREFIX"))')"
          framework_version="$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
          framework_root="$framework_prefix/$framework_python.framework"
          framework_version_root="$framework_root/Versions/$framework_version"
          framework_bundle_framework_root="$bundle_root/Frameworks/$framework_python.framework"
          framework_bundle_root="$framework_bundle_framework_root/Versions/$framework_version"
          framework_binary_name="$framework_python"
          bundle_python3="$bundle_root/bin/python3"
          bundle_python="$bundle_root/bin/python"
          echo "Using Python executable: $python_executable"
          rm -rf "$bundle_root"
          python3 -m venv --copies "$bundle_root"
          if [ ! -d "$framework_version_root" ]; then
            echo "Missing Python.framework runtime at $framework_version_root" >&2
            exit 1
          fi
          mkdir -p "$bundle_root/Frameworks"
          rsync -a \
            --exclude '__pycache__' \
            "$framework_root/" "$framework_bundle_framework_root/"
          rm -f \
            "$framework_bundle_framework_root/Headers" \
            "$framework_bundle_framework_root/Python" \
            "$framework_bundle_framework_root/Resources"
          ln -s "Versions/Current/Headers" "$framework_bundle_framework_root/Headers"
          ln -s "Versions/Current/Python" "$framework_bundle_framework_root/Python"
          ln -s "Versions/Current/Resources" "$framework_bundle_framework_root/Resources"
          if [ ! -L "$framework_bundle_framework_root/Versions/Current" ]; then
            rm -rf "$framework_bundle_framework_root/Versions/Current"
            ln -s "$framework_version" "$framework_bundle_framework_root/Versions/Current"
          fi
          install_name_tool \
            -change "$framework_version_root/$framework_binary_name" \
            "@executable_path/../Frameworks/$framework_python.framework/Versions/$framework_version/$framework_binary_name" \
            "$bundle_python3"
          if [ -e "$bundle_python" ]; then
            install_name_tool \
              -change "$framework_version_root/$framework_binary_name" \
              "@executable_path/../Frameworks/$framework_python.framework/Versions/$framework_version/$framework_binary_name" \
              "$bundle_python"
          fi
          install_name_tool \
            -id "@executable_path/../Frameworks/$framework_python.framework/Versions/$framework_version/$framework_binary_name" \
            "$framework_bundle_root/$framework_binary_name"
          codesign --force --sign - "$framework_bundle_root/$framework_binary_name"
          codesign --force --sign - "$bundle_python3"
          if [ -e "$bundle_python" ]; then
            codesign --force --sign - "$bundle_python"
          fi
          export CPPFLAGS="-I$qpdf_prefix/include ${CPPFLAGS:-}"
          export LDFLAGS="-L$qpdf_prefix/lib ${LDFLAGS:-}"
          export PKG_CONFIG_PATH="$qpdf_prefix/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          "$bundle_python3" -m pip install --upgrade pip
          "$bundle_python3" -m pip install -r desktop/requirements-desktop-posix.txt
          "$bundle_python3" - <<'PY'
          import requests, fitz, pikepdf, PIL, urllib3
          print("python_bundle_import_check=ok")
          PY
          otool -L "$bundle_python3"
          du -sh "$bundle_root"

      - name: Install desktop dependencies
        working-directory: desktop
        shell: bash
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        shell: bash
        run: npm ci

      - name: Generate macOS icon
        shell: bash
        run: |
          iconset_dir="$PWD/desktop/build/icon.iconset"
          source_svg="$PWD/desktop/svg/mac_RetainPDF.svg"
          source_png="$PWD/desktop/build/icon-mac.png"
          rm -rf "$iconset_dir" "$PWD/desktop/build/icon.icns"
          sips -s format png "$source_svg" --out "$source_png" >/dev/null
          mkdir -p "$iconset_dir"
          for size in 16 32 64 128 256 512; do
            sips -z "$size" "$size" "$source_png" --out "$iconset_dir/icon_${size}x${size}.png" >/dev/null
          done
          cp "$iconset_dir/icon_32x32.png" "$iconset_dir/icon_16x16@2x.png"
          cp "$iconset_dir/icon_64x64.png" "$iconset_dir/icon_32x32@2x.png"
          cp "$iconset_dir/icon_256x256.png" "$iconset_dir/icon_128x128@2x.png"
          cp "$iconset_dir/icon_512x512.png" "$iconset_dir/icon_256x256@2x.png"
          cp "$source_png" "$iconset_dir/icon_512x512@2x.png"
          iconutil -c icns "$iconset_dir" -o "$PWD/desktop/build/icon.icns"
          ls -lah "$PWD/desktop/build/icon.icns"

      - name: Build macOS package
        working-directory: desktop
        shell: bash
        env:
          RETAIN_PDF_VERSION: ${{ steps.version.outputs.version }}
          RETAIN_PDF_DESKTOP_PLATFORM: darwin
          RETAIN_PDF_BUNDLE_MAC_PYTHON: "1"
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:mac

      - name: Probe packaged macOS bundled Python
        shell: bash
        run: |
          app_root="$(find "$PWD/desktop" -maxdepth 3 -type d -name 'RetainPDF.app' | head -n 1)"
          if [ -z "$app_root" ]; then
            echo "Packaged RetainPDF.app not found under $PWD/desktop" >&2
            find "$PWD/desktop" -maxdepth 3 -type d | sort
            exit 1
          fi
          python_bin="$app_root/Contents/Resources/backend/python/bin/python3"
          if [ ! -x "$python_bin" ]; then
            echo "Packaged Python binary not found: $python_bin" >&2
            exit 1
          fi
          framework_root="$app_root/Contents/Resources/backend/python/Frameworks/Python.framework"
          find "$framework_root" -maxdepth 2 -type l -exec ls -l {} \;
          if find "$framework_root" -maxdepth 2 -type l -exec readlink {} \; | grep -q '^/Users/runner/'; then
            echo "Packaged Python.framework still contains runner-local absolute symlinks" >&2
            exit 1
          fi
          otool -L "$python_bin"
          "$python_bin" - <<'PY'
          import requests, fitz, pikepdf, PIL, urllib3
          print("packaged_python_import_check=ok")
          PY

      - name: Show desktop bundle manifest
        shell: bash
        run: cat desktop/app/backend/bundle-manifest.json

      - name: Validate desktop bundle manifest
        shell: bash
        run: python3 .github/scripts/validate_desktop_bundle.py --manifest desktop/app/backend/bundle-manifest.json

      - name: Upload macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            desktop/mac/RetainPDF-Mac-${{ steps.version.outputs.version }}.dmg
